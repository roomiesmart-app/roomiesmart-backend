name: Node.js Semantic Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fundamental: descarga todo el historial para que SemVer analice los commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Ajusta esto a la versión exacta que uses en RoomieSmart

      - name: Install dependencies
        run: npm ci

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release